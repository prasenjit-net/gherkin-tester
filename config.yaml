app:
    name: Gherkin Tester
    env: development
    url: http://localhost:8081
    description: Karate test execution agent for API testing.
server:
    host: 0.0.0.0
    port: 8081
    readTimeout: 15s
    writeTimeout: 15s
    idleTimeout: 1m0s
    shutdownTimeout: 10s
logging:
    level: info
    format: text
ui:
    devProxyURL: http://localhost:5173
tests:
    dataDir: ./data
    karateJar: ./data/bin/karate.jar
    maxExecutors: 4
