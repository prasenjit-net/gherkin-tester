app:
  name: Gherkin Tester
  env: development
  url: http://localhost:8080
  description: Karate test execution agent for API testing.

server:
  host: 0.0.0.0
  port: 8080
  readTimeout: 15s
  writeTimeout: 15s
  idleTimeout: 60s
  shutdownTimeout: 10s

logging:
  level: info
  format: text

ui:
  devProxyURL: http://localhost:5173

tests:
  dataDir: ./data
  karateJar: ""
  maxExecutors: 4
